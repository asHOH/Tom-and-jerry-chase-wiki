<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>特性编辑器</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7fa;
        --card: #ffffff;
        --border: #d7d7e3;
        --text: #1c1c28;
        --muted: #5a6072;
        --primary: #315efb;
        --primary-text: #ffffff;
        --danger: #d93025;
        --success: #0d8b68;
        --warning: #e6a23c;
        --shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111318;
          --card: #1c1f24;
          --border: #2a2e36;
          --text: #f5f6fb;
          --muted: #a0a5b5;
          --primary: #7295ff;
          --primary-text: #0b1228;
          --danger: #ff6b6b;
          --success: #2dd4a0;
          --warning: #e6c23c;
          --shadow: 0 12px 32px rgba(0, 0, 0, 0.32);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft Yahei', sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      a {
        color: inherit;
      }

      .container {
        max-width: 1048px;
        margin: 0 auto;
        padding: 32px 20px 96px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 24px;
        border-radius: 20px;
        background: var(--card);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }

      header h1 {
        margin: 0;
        font-size: 1.75rem;
        font-weight: 700;
      }

      header p {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.2s ease,
          background 0.2s ease;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
      }

      button.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: var(--primary-text);
      }

      button.ghost {
        background: transparent;
      }

      button.danger {
        background: transparent;
        border-color: var(--danger);
        color: var(--danger);
      }

      button.success {
        background: transparent;
        border-color: var(--success);
        color: var(--success);
      }

      button.warning {
        background: transparent;
        border-color: var(--warning);
        color: var(--warning);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      button:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.07);
      }

      .trait-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      .trait-card:not(.collapsed):hover {
        transform: translateY(-2px);
      }

      .trait-card.has-error {
        border-color: var(--danger);
      }

      .card-header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.02);
      }

      .card-title {
        font-weight: 600;
        font-size: 1.05rem;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(49, 94, 251, 0.12);
        color: var(--primary);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .badge.success {
        background: rgba(13, 139, 104, 0.12);
        color: var(--success);
      }

      .badge.warning {
        background: rgba(230, 162, 60, 0.12);
        color: var(--warning);
      }

      .card-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card-body {
        padding: 20px;
      }

      .grid {
        display: grid;
        gap: 18px;
      }

      @media (min-width: 720px) {
        .grid.two {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid.three {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid.four {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (min-width: 960px) {
        .grid.two {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .grid.three {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .grid.four {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .field small {
        color: var(--muted);
        font-size: 0.75rem;
      }

      input[type='text'],
      input[type='number'],
      select,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.02);
        font-size: 0.95rem;
        color: var(--text);
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
        font-family: inherit;
      }

      select[multiple] {
        min-height: 140px;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(49, 94, 251, 0.16);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .export-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .export-card h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      #exportOutput {
        font-family: 'Fira Code', 'Cascadia Code', 'SFMono-Regular', Consolas, monospace;
        min-height: 180px;
        white-space: pre;
      }

      .status-text {
        font-size: 0.85rem;
        color: var(--muted);
      }

      .collapsed .card-body {
        display: none;
      }

      .collapsed .card-header {
        border-bottom: none;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 16px;
        border-radius: 12px;
        background: var(--text);
        color: var(--card);
        font-size: 0.9rem;
        display: none;
        z-index: 20;
      }

      .toast.show {
        display: block;
        animation: fadeInOut 2.4s ease forwards;
      }

      @keyframes fadeInOut {
        0% {
          opacity: 0;
          transform: translateY(6px);
        }
        8%,
        82% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(10px);
        }
      }

      .optional-group {
        padding: 18px;
        border-radius: 16px;
        border: 1px dashed var(--border);
        background: rgba(0, 0, 0, 0.02);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .optional-group h3 {
        margin: 0;
        font-size: 1rem;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 0.75rem;
        background: rgba(26, 86, 219, 0.14);
        color: var(--primary);
      }

      footer {
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted);
        padding-bottom: 36px;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 64px 16px;
        text-align: center;
        border-radius: 20px;
        border: 1px dashed var(--border);
        color: var(--muted);
      }

      .empty-state strong {
        font-size: 1.05rem;
        color: var(--text);
      }

      dialog {
        border: none;
        border-radius: 20px;
        padding: 0;
        max-width: min(760px, 90vw);
        width: min(760px, 90vw);
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.45);
      }

      .import-dialog {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 24px;
        background: var(--card);
        color: var(--text);
      }

      .import-dialog h2 {
        margin: 0;
        font-size: 1.25rem;
      }

      .import-dialog textarea {
        min-height: 260px;
        font-family: 'Fira Code', 'Cascadia Code', 'SFMono-Regular', Consolas, monospace;
      }

      .item-group {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.02);
      }

      .item-group-header {
        display: flex;
        justify-content: between;
        align-items: center;
        margin-bottom: 12px;
      }

      .item-group-title {
        font-weight: 600;
        font-size: 0.9rem;
      }

      .item-row {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        background: var(--card);
        border: 1px solid var(--border);
      }

      .item-row:last-child {
        margin-bottom: 0;
      }

      .item-controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .group-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 8px;
        border-radius: 6px;
        background: rgba(49, 94, 251, 0.1);
        color: var(--primary);
        font-size: 0.75rem;
        font-weight: 600;
      }

      .add-item-form {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 8px;
      }

      .special-case {
        border: 1px solid var(--success);
        border-radius: 12px;
        padding: 16px;
        background: rgba(13, 139, 104, 0.05);
        margin-bottom: 16px;
      }

      .special-case:last-child {
        margin-bottom: 0;
      }

      .special-case-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .special-case-title {
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--success);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .special-case-body {
        padding: 0;
      }

      .group-container {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 8px 10px;
        margin-bottom: 8px;
        background: rgba(0, 0, 0, 0.01);
      }

      .group-container:last-child {
        margin-bottom: 0;
      }

      .group-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      .group-header .group-badge {
        font-size: 0.8rem;
        padding: 4px 10px;
      }

      .compact-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 8px;
      }

      .compact-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 6px;
        background: var(--card);
        border: 1px solid var(--border);
        font-size: 0.85rem;
      }

      .compact-item-name {
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1;
      }

      .compact-item-type {
        color: var(--muted);
        font-size: 0.75rem;
      }

      .compact-item-faction {
        color: var(--muted);
        font-size: 0.75rem;
      }

      .compact-item-controls {
        display: flex;
        gap: 4px;
      }

      .compact-item-controls button {
        padding: 4px 8px;
        font-size: 0.75rem;
      }

      .form-row {
        display: flex;
        gap: 12px;
        align-items: end;
      }

      .form-row .field {
        flex: 1;
      }

      .form-row .field:last-child {
        flex: 0 0 auto;
      }

      .field-with-comment {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .field-comment {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: -2px;
      }

      .compact-item-group-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .compact-item-group-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 2px 8px;
        border-radius: 6px;
        background: rgba(49, 94, 251, 0.1);
        color: var(--primary);
        font-size: 0.7rem;
        font-weight: 600;
      }

      .compact-item-controls .danger {
        font-size: 1rem;
        font-weight: bold;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media (max-width: 768px) {
        .form-row {
          flex-wrap: wrap;
          gap: 8px;
        }

        .form-row .field {
          flex: 1 1 calc(50% - 8px);
          min-width: 120px;
        }

        .form-row .field:last-child {
          flex: 1 1 100%;
          margin-top: 8px;
        }

        .form-row .field:last-child button {
          width: 100%;
        }
      }

      @media (max-width: 480px) {
        .form-row .field {
          flex: 1 1 100%;
        }

        .toolbar {
          gap: 8px;
        }

        .toolbar button {
          padding: 8px 12px;
          font-size: 0.85rem;
        }

        .card-actions {
          gap: 4px;
        }

        .card-actions button {
          padding: 6px 10px;
          font-size: 0.85rem;
        }

        .compact-grid {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 6px;
        }

        .grid.two {
          grid-template-columns: 1fr;
          gap: 12px;
        }
      }

      /* 预览区域样式 */
      .preview-section {
        margin-top: 20px;
        padding: 16px;
        background: rgba(0, 0, 0, 0.03);
        border-radius: 16px;
        border-left: 4px solid var(--primary);
      }
      .preview-section .preview-title {
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .preview-content {
        white-space: pre-wrap;
        font-family: inherit;
        font-size: 0.9rem;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.02);
        padding: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        color: var(--text);
      }

      /* 高级内容折叠面板 */
      .advanced-details {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.02);
      }
      .advanced-details summary {
        padding: 14px 18px;
        font-weight: 600;
        cursor: pointer;
        color: var(--primary);
        list-style: none;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .advanced-details summary::-webkit-details-marker {
        display: none;
      }
      .advanced-details summary::before {
        content: '▶';
        display: inline-block;
        transition: transform 0.2s;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .advanced-details[open] summary::before {
        transform: rotate(90deg);
      }
      .advanced-content {
        padding: 0 18px 18px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>特性编辑器</h1>
        <p>编写特性数据，导出后可发送给网站管理员。数据仅保存在本地。</p>
        <div class="toolbar">
          <button id="addTrait" class="primary" type="button">新增特性</button>
          <button id="expandAll" type="button">全部展开</button>
          <button id="collapseAll" type="button">全部收起</button>
          <button id="resetAll" class="danger" type="button">清空全部</button>
          <button id="importPaste" type="button">粘贴导入</button>
          <button id="importFile" type="button">文件导入</button>
          <span id="stats" class="status-text"></span>
        </div>
      </header>

      <div id="traitsContainer" class="stack"></div>

      <section id="emptyState" class="empty-state" hidden>
        <strong>暂时没有特性</strong>
        <button id="emptyAdd" class="primary" type="button">添加新特性</button>
      </section>

      <section class="export-card">
        <h2>导出结果</h2>
        <div class="field">
          <label for="exportOutput">导出代码片段</label>
          <textarea id="exportOutput" readonly spellcheck="false"></textarea>
        </div>
        <div class="toolbar">
          <button id="copyBtn" class="primary" type="button">复制到剪贴板</button>
          <button id="downloadBtn" type="button">下载为 TXT</button>
          <span id="exportStatus" class="status-text"></span>
        </div>
      </section>

      <input id="importFileInput" type="file" accept=".ts,.txt" hidden />

      <dialog id="importDialog">
        <div class="import-dialog">
          <h2>粘贴代码导入</h2>
          <p class="status-text">支持直接粘贴特性定义或编辑器导出的片段。</p>
          <textarea
            id="importTextarea"
            spellcheck="false"
            placeholder="将特性定义粘贴在此处，例如：
汤姆1: {
  group: [
    { name: '发怒冲刺', type: 'skill' },
    { name: '番茄', type: 'item' },
  ],
  description: '发怒冲刺无法解除番茄带来的减速效果。',
},"
          ></textarea>
          <div class="toolbar">
            <button id="importCancel" type="button">取消</button>
            <button id="importConfirm" type="button" class="primary">导入</button>
          </div>
        </div>
      </dialog>
    </div>

    <template id="traitTemplate">
      <article class="trait-card" data-id="">
        <div class="card-header">
          <div class="card-title">
            <span class="badge">特性</span>
            <span data-role="title">未命名特性</span>
          </div>
          <div class="card-actions">
            <button type="button" class="ghost" data-action="toggle">折叠</button>
            <button type="button" class="ghost" data-action="export">剪切板导出</button>
            <button type="button" class="ghost" data-action="export-file">导出为文件</button>
            <button type="button" class="ghost" data-action="duplicate">复制</button>
            <button type="button" class="danger" data-action="delete">删除</button>
          </div>
        </div>
        <div class="card-body">
          <div class="stack">
            <!-- 相关成员 (始终可见) -->
            <div class="optional-group">
              <h3>相关成员</h3>
              <div class="add-item-form">
                <div class="form-row">
                  <div class="field">
                    <label>成员名称 *</label>
                    <input data-role="item-name" type="text" placeholder="例如：汤姆" />
                  </div>
                  <div class="field">
                    <label>成员类型 *</label>
                    <select data-role="item-type">
                      <option value="character">角色</option>
                      <option value="skill">技能</option>
                      <option value="knowledgeCard">知识卡</option>
                      <option value="specialSkill">特技</option>
                      <option value="item">道具</option>
                      <option value="entity">衍生物</option>
                      <option value="buff">状态</option>
                      <option value="map">地图</option>
                      <option value="fixture">地图组件</option>
                      <option value="mode">模式</option>
                      <option value="itemGroup">组合</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>成员阵营</label>
                    <select data-role="item-faction">
                      <option value="">（可选）</option>
                      <option value="cat">猫阵营</option>
                      <option value="mouse">鼠阵营</option>
                    </select>
                  </div>
                  <div class="field">
                    <label>组别</label>
                    <input data-role="item-group-id" type="number" min="1" value="1" />
                  </div>
                  <div class="field">
                    <label>&nbsp;</label>
                    <button type="button" class="primary" data-action="add-item">添加成员</button>
                  </div>
                </div>
                <div class="field-comment">
                  阵营仅用于区分同类型同名内容（例如猫/鼠方应急治疗特技），通常无需填写，会自动识别；组别用于描述成员之间的逻辑关系，同一组别内彼此为"或"关系，组别间为“和”关系。
                </div>
              </div>
              <div class="item-group" data-role="group-container">

                  </div>

                <!-- 动态添加的物件会在这里 -->
              </div>

              <label>特殊情况描述*</label>

                data-field="description"
                placeholder="描述该特殊情况的触发条件和效果"

    <div id="toast" class="toast"></div>

    <script>
      (function () {
        // ---------- 原有代码，仅修改预览函数中的连接符为 '/' ----------
        const traits = [];
        const traitsContainer = document.getElementById('traitsContainer');
        const exportOutput = document.getElementById('exportOutput');
        const exportStatus = document.getElementById('exportStatus');
        const stats = document.getElementById('stats');
        const toast = document.getElementById('toast');
        const emptyState = document.getElementById('emptyState');
        const importPasteBtn = document.getElementById('importPaste');
        const importFileBtn = document.getElementById('importFile');
        const importFileInput = document.getElementById('importFileInput');
        const importDialog = document.getElementById('importDialog');
        const importTextarea = document.getElementById('importTextarea');
        const importConfirm = document.getElementById('importConfirm');
        const importCancel = document.getElementById('importCancel');
        let isBulkUpdating = false;
        const STORAGE_KEY = 'tjwiki-trait-maker-v1';

        const defaultValues = {
          name: '',
          description: '',
          group: [],
          spacialCase: [],
          excludeFactionId: '',
        };

        const itemTypeNames = {
          character: '角色',
          skill: '技能',
          knowledgeCard: '知识卡',
          specialSkill: '特技',
          item: '道具',
          entity: '衍生物',
          buff: '状态',
          map: '地图',
          fixture: '地图组件',
          mode: '模式',
          itemGroup: '组合',
        };

        function generateId() {
          if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
          return 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
        }

        function showToast(message) {
          toast.textContent = message;
          toast.classList.remove('show');
          void toast.offsetWidth;
          toast.classList.add('show');
        }

        // 自动生成特性名称：YYYYMMDD-序号（序号01~99）
        function generateAutoName() {
          const date = new Date();
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          const dateStr = `${year}${month}${day}`;

          // 收集当前所有非空特性名称
          const existingNames = new Set(traits.map((t) => t.name).filter(Boolean));

          for (let i = 1; i <= 99; i++) {
            const seq = String(i).padStart(2, '0');
            const candidate = `${dateStr}-${seq}`;
            if (!existingNames.has(candidate)) {
              return candidate;
            }
          }
          return ''; // 所有序号均被占用，返回空字符串（不自动命名）
        }

        function addTrait(initial = {}, locator) {
          // 判断用户是否显式提供了 name 属性（包括空字符串）
          const hasExplicitName = initial && initial.name !== undefined;

          const trait = {
            id: generateId(),
            ...structuredClone(defaultValues),
            ...initial,
          };

          // 只有未显式提供 name 时才自动生成
          if (!hasExplicitName) {
            const generatedName = generateAutoName();
            if (generatedName) {
              trait.name = generatedName;
            }
          }

          traits.push(trait);
          renderTraitCard(trait, locator);
          if (!isBulkUpdating) {
            persistState();
            updateUI();
          }
          return trait;
        }

        // ---------- 预览核心函数 (修改连接符为 '/') ----------
        function getPlainItemName(item) {
          if (!item || !item.name || !item.type) return '';
          return `${item.name}`;
        }

        function buildGroupArray(items) {
          if (!items || !items.length) return [];
          const groups = new Map();
          items.forEach((item) => {
            const gid = item.groupId || 1;
            if (!groups.has(gid)) groups.set(gid, []);
            groups.get(gid).push(item);
          });
          const sortedGroupIds = Array.from(groups.keys()).sort((a, b) => a - b);
          const result = [];
          sortedGroupIds.forEach((gid) => {
            const groupItems = groups.get(gid);
            result.push(groupItems);
          });
          return result;
        }

        function formatWholeGroupPlain(groupArray, description, isMinor = false) {
          if (!groupArray.length)
            return description ? (isMinor ? ' └─' + description : ' • ' + description) : '';
          const parts = [];
          groupArray.forEach((item) => {
            if (Array.isArray(item)) {
              const subParts = item.map((sub) => getPlainItemName(sub));
              parts.push(subParts.join('/')); // 子组内用 /
            } else {
              parts.push(getPlainItemName(item));
            }
          });
          const namesString = parts.join('、');
          const prefix = isMinor ? ' └─' : ' • ';
          return `${prefix}${namesString}：${description}`;
        }

        function generatePlainPreview(trait) {
          const lines = [];
          const mainGroupArray = buildGroupArray(trait.group || []);
          if (mainGroupArray.length > 0 && trait.description) {
            lines.push(formatWholeGroupPlain(mainGroupArray, trait.description, false));
          } else if (trait.description) {
            lines.push(' • ' + trait.description);
          }
          if (trait.spacialCase && trait.spacialCase.length) {
            trait.spacialCase.forEach((sc) => {
              const scGroupArray = buildGroupArray(sc.group || []);
              if (scGroupArray.length > 0 && sc.description) {
                lines.push(formatWholeGroupPlain(scGroupArray, sc.description, true));
              } else if (sc.description) {
                lines.push(' └─' + sc.description);
              }
            });
          }
          return lines.join('\n');
        }

        function updatePreview(traitId) {
          const card = traitsContainer.querySelector(`.trait-card[data-id="${traitId}"]`);
          if (!card) return;
          const previewDiv = card.querySelector('[data-role="preview"]');
          if (!previewDiv) return;
          const trait = getTraitById(traitId);
          if (!trait) {
            previewDiv.textContent = '';
            return;
          }
          previewDiv.textContent = generatePlainPreview(trait) || '（无描述内容）';
        }

        // ---------- 原有渲染函数 (与之前相同，但确保每次更新后调用updatePreview) ----------
        function renderTraitCard(trait, locator) {
          const template = document.getElementById('traitTemplate');
          const fragment = template.content.cloneNode(true);
          const card = fragment.querySelector('.trait-card');
          card.dataset.id = trait.id;
          card.querySelector('[data-role="title"]').textContent = trait.name
            ? trait.name
            : '未命名特性';
          card.querySelectorAll('[data-field]').forEach((el) => {
            const field = el.dataset.field;
            const value = trait[field] ?? '';
            el.value = value;
          });
          const groupContainer = card.querySelector('[data-role="group-container"]');
          renderGroupItems(groupContainer, trait.group || [], trait.id);
          const specialCasesContainer = card.querySelector('[data-role="special-cases-container"]');
          renderSpecialCases(specialCasesContainer, trait.spacialCase || [], trait.id);
          updateToggleButtonLabel(card);
          bindCardEvents(card, trait.id);
          // 设置高级内容折叠状态
          const details = card.querySelector('.advanced-details');
          if (details && trait.spacialCase && trait.spacialCase.length > 0) {
            details.open = true;
          }
          if (locator) traitsContainer.insertBefore(fragment, locator);
          else traitsContainer.appendChild(fragment);
          updatePreview(trait.id);
        }

        function bindCardEvents(card, traitId) {
          const addItemBtn = card.querySelector('[data-action="add-item"]');
          const addSpecialCaseBtn = card.querySelector('[data-action="add-special-case"]');
          if (addItemBtn) addItemBtn.onclick = () => addItemFromForm(traitId, 'main');
          if (addSpecialCaseBtn) addSpecialCaseBtn.onclick = () => addSpecialCase(traitId);
        }

        function addItemFromForm(traitId, groupType = 'main', caseIndex = null) {
          const trait = getTraitById(traitId);
          if (!trait) return;
          let nameInput, typeSelect, factionSelect, groupIdInput;
          if (groupType === 'main') {
            nameInput = document.querySelector(
              `.trait-card[data-id="${traitId}"] [data-role="item-name"]`
            );
            typeSelect = document.querySelector(
              `.trait-card[data-id="${traitId}"] [data-role="item-type"]`
            );
            factionSelect = document.querySelector(
              `.trait-card[data-id="${traitId}"] [data-role="item-faction"]`
            );
            groupIdInput = document.querySelector(
              `.trait-card[data-id="${traitId}"] [data-role="item-group-id"]`
            );
          } else if (groupType === 'special' && caseIndex !== null) {
            const specialCaseElement = document.querySelector(
              `.trait-card[data-id="${traitId}"] .special-case[data-special-index="${caseIndex}"]`
            );
            if (!specialCaseElement) return;
            nameInput = specialCaseElement.querySelector('[data-role="special-item-name"]');
            typeSelect = specialCaseElement.querySelector('[data-role="special-item-type"]');
            factionSelect = specialCaseElement.querySelector('[data-role="special-item-faction"]');
            groupIdInput = specialCaseElement.querySelector('[data-role="special-item-group-id"]');
          } else return;
          if (!nameInput || !typeSelect || !groupIdInput) return;
          const name = nameInput.value.trim();
          const type = typeSelect.value;
          const factionId = factionSelect ? factionSelect.value : '';
          const groupId = parseInt(groupIdInput.value) || 1;
          if (!name) {
            showToast('请输入成员名称');
            return;
          }
          const item = {
            name,
            type,
            factionId: factionId || undefined,
            groupId,
          };
          if (groupType === 'main') {
            if (!trait.group) trait.group = [];
            trait.group.push(item);
          } else if (groupType === 'special' && caseIndex !== null) {
            if (!trait.spacialCase[caseIndex]) return;
            if (!trait.spacialCase[caseIndex].group) trait.spacialCase[caseIndex].group = [];
            trait.spacialCase[caseIndex].group.push(item);
          }
          groupIdInput.value = groupId + 1;
          nameInput.value = '';
          if (factionSelect) factionSelect.value = '';
          persistState();
          updateTraitCard(traitId);
          // 对于特殊情况，重新设置组别输入框的值并清空名称/阵营
          if (groupType === 'special' && caseIndex !== null) {
            const newSpecialCaseElement = document.querySelector(
              `.trait-card[data-id="${traitId}"] .special-case[data-special-index="${caseIndex}"]`
            );
            if (newSpecialCaseElement) {
              const newNameInput = newSpecialCaseElement.querySelector(
                '[data-role="special-item-name"]'
              );
              const newFactionSelect = newSpecialCaseElement.querySelector(
                '[data-role="special-item-faction"]'
              );
              const newGroupIdInput = newSpecialCaseElement.querySelector(
                '[data-role="special-item-group-id"]'
              );
              if (newNameInput) newNameInput.value = '';
              if (newFactionSelect) newFactionSelect.value = '';
              if (newGroupIdInput) newGroupIdInput.value = groupId + 1;
            }
          }
          updateUI();
          showToast('已添加成员');
        }

        function renderGroupItems(container, items, traitId, groupType = 'main', caseIndex = null) {
          container.innerHTML = '';
          if (!items || !items.length) {
            const emptyMsg = document.createElement('div');
            emptyMsg.textContent = '暂无成员';
            emptyMsg.style.color = 'var(--muted)';
            emptyMsg.style.fontStyle = 'italic';
            emptyMsg.style.textAlign = 'center';
            emptyMsg.style.padding = '20px';
            container.appendChild(emptyMsg);
            return;
          }
          const groups = {};
          items.forEach((item, index) => {
            const groupId = item.groupId || 1;
            if (!groups[groupId]) groups[groupId] = [];
            groups[groupId].push({ ...item, index });
          });
          const sortedGroupIds = Object.keys(groups)
            .map(Number)
            .sort((a, b) => a - b);
          sortedGroupIds.forEach((groupId) => {
            const groupItems = groups[groupId];
            const groupContainer = document.createElement('div');
            groupContainer.className = 'group-container';
            const compactGrid = document.createElement('div');
            compactGrid.className = 'compact-grid';
            const groupHeader = document.createElement('div');
            groupHeader.className = 'compact-item-group-header';
            const groupBadge = document.createElement('span');
            groupBadge.className = 'compact-item-group-badge';
            groupBadge.textContent = `组别 ${groupId}`;
            groupHeader.appendChild(groupBadge);
            compactGrid.appendChild(groupHeader);
            groupItems.forEach(({ name, type, factionId, groupId, index }) => {
              const itemTemplate = document.getElementById('compactItemTemplate');
              const itemFragment = itemTemplate.content.cloneNode(true);
              const itemElement = itemFragment.querySelector('.compact-item');
              itemElement.dataset.itemIndex = index;
              itemElement.querySelector('[data-role="item-name"]').textContent = name;
              itemElement.querySelector('[data-role="item-type"]').textContent =
                itemTypeNames[type] || type;
              if (factionId) {
                itemElement.querySelector('[data-role="item-faction"]').textContent =
                  factionId === 'cat' ? '猫' : '鼠';
              } else {
                itemElement.querySelector('[data-role="item-faction"]').textContent = '';
              }
              itemElement.querySelector('[data-field="name"]').value = name;
              itemElement.querySelector('[data-field="type"]').value = type;
              itemElement.querySelector('[data-field="factionId"]').value = factionId || '';
              itemElement.querySelector('[data-field="groupId"]').value = groupId;
              const removeBtn = itemFragment.querySelector('[data-action="remove-item"]');
              removeBtn.addEventListener('click', () => {
                if (confirm('确认删除这个成员吗？'))
                  removeGroupItem(traitId, index, groupType, caseIndex);
              });
              compactGrid.appendChild(itemFragment);
            });
            groupContainer.appendChild(compactGrid);
            container.appendChild(groupContainer);
          });
        }

        function renderSpecialCases(container, specialCases, traitId) {
          container.innerHTML = '';
          specialCases.forEach((specialCase, caseIndex) => {
            const caseTemplate = document.getElementById('specialCaseTemplate');
            const caseFragment = caseTemplate.content.cloneNode(true);
            const caseElement = caseFragment.querySelector('.special-case');
            caseElement.dataset.specialIndex = caseIndex;
            const description = specialCase.description || '未描述的特殊情况';
            caseElement.querySelector('[data-role="special-title"]').textContent =
              description.length > 30 ? description.substring(0, 30) + '...' : description;
            caseElement.querySelector('[data-field="description"]').value =
              specialCase.description || '';
            const groupContainer = caseElement.querySelector(
              '[data-role="special-group-container"]'
            );
            renderGroupItems(
              groupContainer,
              specialCase.group || [],
              traitId,
              'special',
              caseIndex
            );
            const removeBtn = caseFragment.querySelector('[data-action="remove-special-case"]');
            removeBtn.addEventListener('click', () => {
              if (confirm('确认删除这个特殊情况吗？')) removeSpecialCase(traitId, caseIndex);
            });
            const addSpecialItemBtn = caseElement.querySelector('[data-action="add-special-item"]');
            if (addSpecialItemBtn)
              addSpecialItemBtn.onclick = () => addItemFromForm(traitId, 'special', caseIndex);
            const descriptionField = caseElement.querySelector('[data-field="description"]');
            descriptionField.addEventListener('input', () =>
              handleSpecialCaseFieldChange(
                traitId,
                caseIndex,
                'description',
                descriptionField.value
              )
            );
            container.appendChild(caseFragment);
          });
        }

        function handleSpecialCaseFieldChange(traitId, caseIndex, field, value) {
          const trait = getTraitById(traitId);
          if (!trait || !trait.spacialCase || !trait.spacialCase[caseIndex]) return;
          trait.spacialCase[caseIndex][field] = value;
          const caseElement = document.querySelector(
            `.trait-card[data-id="${traitId}"] .special-case[data-special-index="${caseIndex}"]`
          );
          if (caseElement) {
            const titleElement = caseElement.querySelector('[data-role="special-title"]');
            titleElement.textContent =
              value.length > 30 ? value.substring(0, 30) + '...' : value || '未描述的特殊情况';
          }
          persistState();
          updatePreview(traitId);
        }

        function removeGroupItem(traitId, index, groupType = 'main', caseIndex = null) {
          const trait = getTraitById(traitId);
          if (!trait) return;
          let targetArray;
          if (groupType === 'main') targetArray = trait.group;
          else if (groupType === 'special' && caseIndex !== null) {
            if (!trait.spacialCase[caseIndex]) return;
            targetArray = trait.spacialCase[caseIndex].group;
          } else return;
          targetArray.splice(index, 1);
          persistState();
          updateTraitCard(traitId);
          updateUI();
          showToast('已删除成员');
        }

        function addSpecialCase(traitId) {
          const trait = getTraitById(traitId);
          if (!trait) return;
          if (!trait.spacialCase) trait.spacialCase = [];
          trait.spacialCase.push({ description: '', group: [] });
          persistState();
          updateTraitCard(traitId);
          updateUI();
          showToast('已添加特殊情况');
        }

        function removeSpecialCase(traitId, caseIndex) {
          const trait = getTraitById(traitId);
          if (!trait || !trait.spacialCase) return;
          trait.spacialCase.splice(caseIndex, 1);
          persistState();
          updateTraitCard(traitId);
          updateUI();
          showToast('已删除特殊情况');
        }

        function updateTraitCard(traitId) {
          const card = traitsContainer.querySelector(`.trait-card[data-id="${traitId}"]`);
          if (!card) return;
          const trait = getTraitById(traitId);
          if (!trait) return;
          const groupContainer = card.querySelector('[data-role="group-container"]');
          const specialCasesContainer = card.querySelector('[data-role="special-cases-container"]');
          if (groupContainer) renderGroupItems(groupContainer, trait.group || [], traitId);
          if (specialCasesContainer)
            renderSpecialCases(specialCasesContainer, trait.spacialCase || [], traitId);
          bindCardEvents(card, traitId);
          // 动态更新高级内容折叠状态
          const details = card.querySelector('.advanced-details');
          if (details) {
            details.open = !!(trait.spacialCase && trait.spacialCase.length > 0);
          }
          updatePreview(traitId);
        }

        function updateToggleButtonLabel(card) {
          const toggleButton = card.querySelector('button[data-action="toggle"]');
          if (toggleButton)
            toggleButton.textContent = card.classList.contains('collapsed') ? '展开' : '折叠';
        }

        function getTraitById(id) {
          return traits.find((t) => t.id === id);
        }

        function removeTrait(id) {
          const index = traits.findIndex((t) => t.id === id);
          if (index === -1) return;
          traits.splice(index, 1);
          const card = traitsContainer.querySelector(`.trait-card[data-id="${id}"]`);
          card?.remove();
          if (!isBulkUpdating) {
            persistState();
            updateUI();
          }
        }

        function duplicateTrait(id) {
          const source = getTraitById(id);
          if (!source) return;
          const clone = structuredClone(source);
          clone.id = generateId();
          if (clone.name) clone.name = `${clone.name} 副本`;
          const anchor = traitsContainer.querySelector(`.trait-card[data-id="${id}"]`);
          addTrait(clone, anchor?.nextSibling ?? null);
          showToast('已复制特性');
        }

        function toggleCard(id) {
          const card = traitsContainer.querySelector(`.trait-card[data-id="${id}"]`);
          if (!card) return;
          card.classList.toggle('collapsed');
          updateToggleButtonLabel(card);
        }

        function collapseAll(state) {
          traitsContainer.querySelectorAll('.trait-card').forEach((card) => {
            card.classList.toggle('collapsed', state);
            updateToggleButtonLabel(card);
          });
        }

        function handleFieldChange(target) {
          const card = target.closest('.trait-card');
          if (!card) return;
          const id = card.dataset.id;
          const trait = getTraitById(id);
          if (!trait) return;

          const field = target.dataset.field;
          const value = target.value;

          // 检查是否在特殊情况内部
          const specialCaseElement = target.closest('.special-case');
          if (specialCaseElement) {
            const caseIndex = parseInt(specialCaseElement.dataset.specialIndex, 10);
            if (!isNaN(caseIndex) && trait.spacialCase && trait.spacialCase[caseIndex]) {
              // 更新特殊情况的字段
              trait.spacialCase[caseIndex][field] = value;
              // 更新特殊情况标题（如果是描述字段）
              if (field === 'description') {
                const titleElement = specialCaseElement.querySelector(
                  '[data-role="special-title"]'
                );
                if (titleElement) {
                  titleElement.textContent =
                    value.length > 30
                      ? value.substring(0, 30) + '...'
                      : value || '未描述的特殊情况';
                }
              }
              persistState();
              updatePreview(id);
              return; // 已处理特殊情况，不再执行主特性更新
            }
          }

          // 否则，更新主特性字段
          trait[field] = value;
          if (field === 'name') {
            const title = card.querySelector('[data-role="title"]');
            title.textContent = trait.name ? trait.name : '未命名特性';
          }
          persistState();
          updateUI();
          updatePreview(id);
        }

        // 导出相关函数 (保持原样)
        function escapeString(value) {
          return value
            .replace(/\\/g, '\\\\')
            .replace(/'/g, "\\'")
            .replace(/\r\n|\r|\n/g, '\\n');
        }
        function formatString(value) {
          return `'${escapeString(value)}'`;
        }
        function buildGroupStructure(items) {
          if (!items || !items.length) return '[]';
          const groups = {};
          items.forEach((item) => {
            const gid = item.groupId || 1;
            if (!groups[gid]) groups[gid] = [];
            groups[gid].push(item);
          });
          const sortedGroupIds = Object.keys(groups)
            .map(Number)
            .sort((a, b) => a - b);
          const result = [];
          sortedGroupIds.forEach((gid) => {
            const groupItems = groups[gid];
            const itemStrings = groupItems.map((item) => buildSingleItem(item));
            if (itemStrings.length > 1) {
              // 多个元素时包装为数组
              result.push(`[${itemStrings.join(',\n')}]`);
            } else {
              // 单个元素时直接输出对象字符串
              result.push(itemStrings[0]);
            }
          });
          return `[\n${result.join(',\n')}\n]`;
        }
        function buildSingleItem(item) {
          if (!item.name || !item.type) return null;
          if (item.type === 'itemGroup')
            return `{ name: ${formatString(item.name)}, type: 'itemGroup' }`;
          else {
            const parts = [`name: ${formatString(item.name)}`, `type: '${item.type}'`];
            if (item.factionId) parts.push(`factionId: '${item.factionId}'`);
            return `{ ${parts.join(', ')} }`;
          }
        }
        function buildTraitEntry(trait, options = {}) {
          const { indent = 2, trailingComma = true } = options;
          const name = (trait.name ?? '').trim();
          if (!name) return null;
          const indentStr = ' '.repeat(indent);
          const innerIndent = ' '.repeat(indent + 2);
          const key = /^[$A-Za-z_\p{Letter}][\w\p{Letter}]*$/u.test(name)
            ? name
            : `'${escapeString(name)}'`;
          const lines = [];
          if (trait.description)
            lines.push(`${innerIndent}description: ${formatString(trait.description)},`);
          const groupStructure = buildGroupStructure(trait.group || []);
          if (groupStructure !== '[]') lines.push(`${innerIndent}group: ${groupStructure},`);
          const specialCases = (trait.spacialCase || [])
            .map((sc) => {
              const caseGroupStructure = buildGroupStructure(sc.group || []);
              if (caseGroupStructure === '[]' && !sc.description) return null;
              const caseLines = [];
              if (sc.description) caseLines.push(`description: ${formatString(sc.description)}`);
              if (caseGroupStructure !== '[]') caseLines.push(`group: ${caseGroupStructure}`);
              return `{\n${caseLines.join(',\n')}\n${innerIndent}}`;
            })
            .filter(Boolean);
          if (specialCases.length)
            lines.push(
              `${innerIndent}spacialCase: [\n${specialCases.join(',\n')}\n${innerIndent}],`
            );
          if (trait.excludeFactionId)
            lines.push(`${innerIndent}excludeFactionId: '${trait.excludeFactionId}',`);
          const body = lines.length ? `\n${lines.join('\n')}\n${indentStr}` : '';
          const suffix = trailingComma ? ',' : '';
          return `${indentStr}${key}: {${body}}${suffix}`;
        }
        function buildSnippet() {
          return traits
            .map((t) => buildTraitEntry(t, { indent: 2, trailingComma: true }))
            .filter(Boolean)
            .join('\n\n');
        }
        async function exportSingleTrait(trait) {
          const snippet = buildTraitEntry(trait, {
            indent: 2,
            trailingComma: true,
          });
          if (!snippet) {
            showToast('特性名称为空，无法导出');
            return;
          }
          const payload = `${snippet}\n`;
          const displayName = (trait.name ?? '').trim() || '特性';
          let success = false;
          try {
            await navigator.clipboard.writeText(payload);
            success = true;
          } catch (_) {
            let fallback = null;
            try {
              fallback = document.createElement('textarea');
              fallback.value = payload;
              fallback.style.position = 'fixed';
              fallback.style.opacity = '0';
              document.body.appendChild(fallback);
              fallback.focus();
              fallback.select();
              success = document.execCommand('copy');
            } catch (_) {
              success = false;
            } finally {
              if (fallback && fallback.parentNode) fallback.parentNode.removeChild(fallback);
            }
          }
          showToast(success ? `已导出 ${displayName}` : '导出失败，请重试');
        }
        function exportTraitToFile(trait) {
          const snippet = buildTraitEntry(trait, {
            indent: 2,
            trailingComma: false,
          });
          if (!snippet) {
            showToast('特性名称为空，无法导出');
            return;
          }
          const blob = new Blob([snippet], {
            type: 'text/plain;charset=utf-8',
          });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          const timestamp = new Date();
          const pad = (n) => String(n).padStart(2, '0');
          const displayName = (trait.name ?? '').trim() || '未命名特性';
          const safeName = displayName.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_');
          const filename = `特性_${safeName}_${timestamp.getFullYear()}${pad(timestamp.getMonth() + 1)}${pad(timestamp.getDate())}-${pad(timestamp.getHours())}${pad(timestamp.getMinutes())}.txt`;
          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          showToast(`已导出 ${displayName} 为文件`);
        }
        function updateUI() {
          const snippet = buildSnippet();
          exportOutput.value = snippet;
          const total = traits.length;
          const missingName = traits.filter((t) => !(t.name ?? '').trim()).length;
          stats.textContent = total ? `共 ${total} 个特性，其中 ${missingName} 个未命名` : '';
          exportStatus.textContent = snippet
            ? `已生成 ${snippet.split('\n').length} 行代码`
            : '无可导出内容';
          emptyState.hidden = total !== 0;
          traitsContainer.querySelectorAll('.trait-card').forEach((card) => {
            const trait = getTraitById(card.dataset.id);
            if (!trait) return;
            const nameMissing = !(trait.name ?? '').trim();
            const descriptionMissing = !(trait.description ?? '').trim();
            const groupEmpty = !trait.group || trait.group.length === 0;
            card.classList.toggle('has-error', nameMissing || descriptionMissing || groupEmpty);
          });
        }
        function persistState() {
          const payload = traits.map(({ id, ...rest }) => ({ id, ...rest }));
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
          } catch (_) {}
        }
        function hydrateState() {
          let restored = null;
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) restored = JSON.parse(raw);
          } catch (_) {}
          if (Array.isArray(restored) && restored.length) restored.forEach((t) => addTrait(t));
          else addTrait();
        }

        // 导入相关函数 (保持原样)
        function stripComments(source) {
          /* 略，完整保留 */ let result = '',
            i = 0,
            inString = false,
            stringQuote = '',
            escaping = false;
          while (i < source.length) {
            const char = source[i];
            if (inString) {
              result += char;
              if (escaping) escaping = false;
              else if (char === '\\') escaping = true;
              else if (char === stringQuote) inString = false;
              i++;
              continue;
            }
            if (char === "'" || char === '"' || char === '`') {
              inString = true;
              stringQuote = char;
              result += char;
              i++;
              continue;
            }
            if (char === '/' && source[i + 1] === '/') {
              i += 2;
              while (i < source.length && source[i] !== '\n' && source[i] !== '\r') i++;
              continue;
            }
            if (char === '/' && source[i + 1] === '*') {
              i += 2;
              while (i < source.length && !(source[i] === '*' && source[i + 1] === '/')) i++;
              i += 2;
              continue;
            }
            result += char;
            i++;
          }
          return result;
        }
        function parseTraitDefinitions(raw) {
          let code = raw.trim();
          if (!code) throw new Error('导入内容为空');
          try {
            if (code.startsWith('{') && code.endsWith('}')) {
              const cleaned = stripComments(code);
              return new Function('"use strict"; return (' + cleaned + ');')();
            }
            if (!code.startsWith('{')) code = '{' + code + '}';
            const cleaned = stripComments(code);
            return new Function('"use strict"; return (' + cleaned + ');')();
          } catch (e) {
            console.error(e);
            throw new Error('无法解析代码片段');
          }
        }
        function looksLikeTraitDefinition(obj) {
          const known = ['description', 'group', 'spacialCase', 'excludeFactionId'];
          return known.some((key) => Object.prototype.hasOwnProperty.call(obj, key));
        }
        function transformDefinitionToInitial(name, definition) {
          const initial = {
            name,
            description: definition.description || '',
            group: [],
            spacialCase: [],
            excludeFactionId: definition.excludeFactionId || '',
          };
          if (definition.group && Array.isArray(definition.group)) {
            definition.group.forEach((item) => {
              if (Array.isArray(item)) {
                const groupId =
                  initial.group.length > 0
                    ? Math.max(...initial.group.map((i) => i.groupId)) + 1
                    : 1;
                item.forEach((subItem) => {
                  if (subItem && typeof subItem === 'object')
                    initial.group.push({
                      name: subItem.name || '',
                      type: subItem.type || 'character',
                      factionId: subItem.factionId || '',
                      groupId,
                    });
                });
              } else if (item && typeof item === 'object') {
                initial.group.push({
                  name: item.name || '',
                  type: item.type || 'character',
                  factionId: item.factionId || '',
                  groupId: 1,
                });
              }
            });
          }
          if (definition.spacialCase && Array.isArray(definition.spacialCase)) {
            definition.spacialCase.forEach((specialCase) => {
              if (specialCase && typeof specialCase === 'object') {
                const transformed = {
                  description: specialCase.description || '',
                  group: [],
                };
                if (specialCase.group && Array.isArray(specialCase.group)) {
                  specialCase.group.forEach((item) => {
                    if (Array.isArray(item)) {
                      const groupId =
                        transformed.group.length > 0
                          ? Math.max(...transformed.group.map((i) => i.groupId)) + 1
                          : 1;
                      item.forEach((subItem) => {
                        if (subItem && typeof subItem === 'object')
                          transformed.group.push({
                            name: subItem.name || '',
                            type: subItem.type || 'character',
                            factionId: subItem.factionId || '',
                            groupId,
                          });
                      });
                    } else if (item && typeof item === 'object') {
                      transformed.group.push({
                        name: item.name || '',
                        type: item.type || 'character',
                        factionId: item.factionId || '',
                        groupId: 1,
                      });
                    }
                  });
                }
                initial.spacialCase.push(transformed);
              }
            });
          }
          return initial;
        }
        function importTraitsFromText(raw) {
          let parsed;
          try {
            parsed = parseTraitDefinitions(raw);
          } catch (error) {
            showToast((error && error.message) || '导入失败');
            return;
          }
          if (traits.length > 0 && !confirm('导入将覆盖当前所有特性，是否继续？')) return;
          const entries = Object.entries(parsed);
          if (!entries.length) {
            showToast('未找到任何特性定义');
            return;
          }
          let count = 0;
          isBulkUpdating = true;
          traits.length = 0;
          traitsContainer.innerHTML = '';
          try {
            entries.forEach(([traitName, definition]) => {
              if (!definition || typeof definition !== 'object') return;
              if (!looksLikeTraitDefinition(definition)) return;
              const normalizedName = String(traitName);
              const initial = transformDefinitionToInitial(normalizedName, definition);
              addTrait(initial);
              count++;
            });
          } finally {
            isBulkUpdating = false;
          }
          if (!count) {
            updateUI();
            showToast('未找到可导入的特性定义');
            return;
          }
          persistState();
          updateUI();
          if (importTextarea) importTextarea.value = '';
          showToast(`已导入 ${count} 个特性`);
        }

        // 事件绑定
        traitsContainer.addEventListener('input', (e) => {
          const t = e.target;
          if (t.matches('[data-field]')) handleFieldChange(t);
        });
        traitsContainer.addEventListener('change', (e) => {
          const t = e.target;
          if (t.matches('[data-field]')) handleFieldChange(t);
        });
        traitsContainer.addEventListener('click', (e) => {
          const btn = e.target.closest('button[data-action]');
          if (!btn) return;
          const card = btn.closest('.trait-card');
          if (!card) return;
          const id = card.dataset.id;
          const action = btn.dataset.action;
          if (action === 'delete') {
            if (confirm('确认删除该特性吗？')) {
              removeTrait(id);
              showToast('已删除特性');
            }
          } else if (action === 'toggle') toggleCard(id);
          else if (action === 'duplicate') duplicateTrait(id);
          else if (action === 'export') {
            const trait = getTraitById(id);
            if (trait) exportSingleTrait(trait);
          } else if (action === 'export-file') {
            const trait = getTraitById(id);
            if (trait) exportTraitToFile(trait);
          }
        });

        document.getElementById('addTrait').addEventListener('click', () => {
          addTrait();
          showToast('已新增特性');
        });
        document.getElementById('emptyAdd').addEventListener('click', () => {
          addTrait();
          showToast('已新增特性');
        });
        document.getElementById('expandAll').addEventListener('click', () => collapseAll(false));
        document.getElementById('collapseAll').addEventListener('click', () => collapseAll(true));
        document.getElementById('resetAll').addEventListener('click', () => {
          if (!traits.length) return;
          if (!confirm('确认清空所有特性吗？此操作无法撤销。')) return;
          traits.length = 0;
          traitsContainer.innerHTML = '';
          persistState();
          updateUI();
          showToast('已清空');
        });
        document.getElementById('copyBtn').addEventListener('click', async () => {
          const s = exportOutput.value.trim();
          if (!s) {
            showToast('没有可复制的内容');
            return;
          }
          try {
            await navigator.clipboard.writeText(s);
            showToast('已复制到剪贴板');
          } catch (_) {
            exportOutput.select();
            document.execCommand('copy');
            showToast('已复制（回退模式）');
          }
        });
        document.getElementById('downloadBtn').addEventListener('click', () => {
          const s = exportOutput.value.trim();
          if (!s) {
            showToast('没有可导出的内容');
            return;
          }
          const blob = new Blob([s], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          const d = new Date();
          const pad = (n) => String(n).padStart(2, '0');
          link.href = url;
          link.download = `tjwiki-traits-${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}.txt`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
          showToast('已下载 TXT 文件');
        });
        function openPasteDialog() {
          if (importDialog && typeof importDialog.showModal === 'function') {
            if (importTextarea) importTextarea.value = '';
            importDialog.showModal();
            requestAnimationFrame(() => importTextarea?.focus());
          } else {
            const raw = window.prompt('请粘贴特性定义代码：');
            if (raw) importTraitsFromText(raw);
          }
        }
        importPasteBtn?.addEventListener('click', openPasteDialog);
        importConfirm?.addEventListener('click', () => {
          const raw = importTextarea?.value ?? '';
          if (!raw.trim()) {
            showToast('导入内容为空');
            return;
          }
          if (importDialog?.open) importDialog.close();
          importTraitsFromText(raw);
        });
        importCancel?.addEventListener('click', () => {
          if (importDialog?.open) importDialog.close();
        });
        importDialog?.addEventListener('close', () => {
          if (importTextarea) importTextarea.value = '';
        });
        importFileBtn?.addEventListener('click', () => importFileInput?.click());
        importFileInput?.addEventListener('change', async (e) => {
          const input = e.target;
          if (!(input instanceof HTMLInputElement)) return;
          const file = input.files && input.files[0];
          if (!file) return;
          if (traits.length > 0 && !confirm('导入将覆盖当前所有特性，是否继续？')) {
            input.value = '';
            return;
          }
          try {
            const text = await file.text();
            importTraitsFromText(text);
          } catch (_) {
            showToast('读取文件失败');
          } finally {
            input.value = '';
          }
        });

        hydrateState();
        updateUI();
      })();
    </script>
  </body>
</html>
